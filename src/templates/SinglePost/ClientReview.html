<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Review Template - Aspire</title>
    <!-- Vite will automatically inject the Tailwind CSS if we link the main CSS file -->
    <link rel="stylesheet" href="/src/index.css">
    <style>
        /* Contenedor base estricto para asegurar la exportación a 1080x1080 */
        .template-canvas {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            background-color: #0F1A20;
            /* aspire-navy-deep fallback */
        }
    </style>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen m-0">

    <!-- CANVAS 1080x1080 -->
    <div class="template-canvas w-[1080px] h-[1080px] shrink-0 shadow-2xl flex flex-col p-[70px]">

        <!-- Imagen de Fondo con Efecto de Capas (Overlay) -->
        <div class="absolute inset-0 z-0">
            <!-- Imagen inyectable -->
            <img src="{{url_background_img}}" crossorigin="anonymous" class="w-full h-full object-cover mix-blend-overlay opacity-50"
                alt="Background"
                onerror="this.src='https://images.unsplash.com/photo-1582063289852-62e3ba2747f8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080'">
            <!-- Gradiente Premium superpuesto -->
            <div
                class="absolute inset-0 bg-gradient-to-br from-aspire-navy-deep/95 via-aspire-navy/80 to-aspire-orange/30">
            </div>
        </div>

        <!-- CONTENIDO PRINCIPAL (z-10 para estar por encima del fondo) -->
        <div class="relative z-10 flex flex-col h-full justify-between">

            <!-- Grupo Centrado: Título + Tarjeta -->
            <div class="flex flex-col w-full my-auto">
                <!-- Cabecera / Título -->
                <div class="w-full mb-8 relative -top-[45px]">
                    <h1 class="font-serif text-white text-[80px] leading-[0.99] tracking-tight drop-shadow-lg m-0">
                        {{main_title}}
                    </h1>
                </div>

                <!-- Tarjeta de Review (Efecto Glassmorphism Avanzado) -->
                <div
                    class="relative w-full rounded-[32px] border border-white/20 p-12 shadow-[0_20px_50px_rgba(0,0,0,0.3)] group overflow-hidden">
                    
                    <!-- FIX para SVG/html-to-image: fondo blur en capa absoluta para evitar recortes -->
                    <div class="absolute inset-0 bg-white/10 backdrop-blur-3xl z-[-1]"></div>

                    <!-- Resplandor sutil interno (radial gradient en lugar de blur para exportar bien) -->
                    <div
                        class="absolute -top-40 -right-40 w-80 h-80 bg-[radial-gradient(circle,rgba(205,131,56,0.3)_0%,rgba(205,131,56,0)_70%)] rounded-full pointer-events-none z-[-1]">
                    </div>

                    <!-- Perfil del Cliente -->
                    <div class="flex items-center gap-6 mb-10 relative z-10">
                        <!-- Avatar con borde gradiente -->
                        <div
                            class="w-32 h-32 rounded-full p-[4px] bg-gradient-to-tr from-aspire-orange via-aspire-warning to-aspire-navy shadow-lg shrink-0 relative z-10">
                            <img src="{{client_avatar_url}}" crossorigin="anonymous"
                                class="w-full h-full rounded-full object-cover border-[3px] border-white" alt="Avatar"
                                onerror="this.src='https://storage.polotno.com/templates/72f22356ab2353c7a8ddbfda894b23ed81549cd668d79f529a738c5e7e789166.png'">
                        </div>

                        <div class="flex flex-col">
                            <h2 class="font-sans font-bold text-[42px] text-white leading-none mb-3">
                                {{client_name}}
                            </h2>
                            <!-- Bloque de Estrellas -->
                            <div class="flex gap-2">
                                <!-- SVG reutilizable para estrella -->
                                <svg class="w-8 h-8 text-aspire-orange drop-shadow-sm" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                                <svg class="w-8 h-8 text-aspire-orange drop-shadow-sm" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                                <svg class="w-8 h-8 text-aspire-orange drop-shadow-sm" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                                <svg class="w-8 h-8 text-aspire-orange drop-shadow-sm" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                                <svg class="w-8 h-8 text-aspire-orange drop-shadow-sm" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Textos del Review -->
                    <div class="relative z-10 pl-6 border-l-4 border-aspire-orange/60">
                        <p class="font-sans text-[48px] font-light italic text-white leading-tight mb-8">
                            "{{review_text_1}}"
                        </p>
                        <p class="font-sans text-[36px] font-bold text-aspire-orange tracking-wider uppercase">
                            {{review_text_2}}
                        </p>
                    </div>

                    <!-- Botón @Handle dentro de la tarjeta -->
                    <div class="mt-12 relative z-10 flex">
                        <div
                            class="bg-gradient-to-r from-aspire-orange to-[#A97A2E] text-white font-sans font-bold text-[26px] tracking-[0.15em] uppercase py-4 px-10 rounded-full shadow-lg border border-white/20 flex items-center justify-center">
                            @{{brand_handle}}
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Script de pruebas (eliminar en prod). Esto inyecta datos por defecto si las variables no son reemplazadas -->
        <script>
            const placeholders = {
                '{{url_background_img}}': 'https://images.unsplash.com/photo-1582063289852-62e3ba2747f8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wxMTY5OTZ8MHwxfHNlYXJjaHw0Nnx8aG91c2V8ZW58MHx8fHwxNzYwMjI2NzgwfDA&ixlib=rb-4.1.0&q=80&w=1080',
                '{{main_title}}': 'Client Review',
                '{{client_avatar_url}}': 'https://storage.polotno.com/templates/72f22356ab2353c7a8ddbfda894b23ed81549cd668d79f529a738c5e7e789166.png',
                '{{client_name}}': 'Justin Eisele',
                '{{review_text_1}}': 'No one does customer service like Aspire in the web hosting world.',
                '{{review_text_2}}': 'I HIGHLY recommend them.',
                '{{brand_handle}}': 'aspireloans'
            };

            // Reemplazo visual automático solo si estamos probando en local
            document.body.innerHTML = document.body.innerHTML.replace(/{{(.*?)}}/g, (match) => {
                return placeholders[match] || match;
            });
        </script>
</body>

</html>
