<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel - Cover</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="/src/index.css" rel="stylesheet">
    <style>
        .template-canvas {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            transform-origin: top left;
        }
    </style>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen m-0">

    <!-- CANVAS 1080x1080 -->
    <div class="template-canvas w-[1080px] h-[1080px] shrink-0 shadow-2xl flex flex-col bg-aspire-navy-secondary">
        
        <!-- Main Content Area -->
        <div class="flex-1 p-[70px] pb-[30px] flex flex-col">
            <!-- Rounded Split Container -->
            <div class="flex-1 w-full bg-aspire-bg rounded-[48px] overflow-hidden flex shadow-lg relative">
                
                <!-- Left Text Column -->
                <div class="w-[58%] h-full p-16 flex flex-col justify-between relative z-10">
                    
                    <div class="flex flex-col gap-6 mt-4">
                        <!-- Headings -->
                        <h1 class="font-serif text-[100px] leading-[0.95] tracking-tight text-aspire-navy m-0">
                            <span class="italic block">{{cover_title_1}}</span>
                            <span class="italic text-aspire-orange">{{cover_title_italic}}</span>
                            <span class="italic text-aspire-navy">{{cover_title_for}}</span><br>
                            <span class="italic block">{{cover_title_2}}</span>
                        </h1>
                        
                        <!-- Subtitle -->
                        <p class="font-sans text-[32px] leading-tight text-aspire-navy font-medium max-w-[90%] m-0 mt-4">
                            {{cover_subtitle}}
                        </p>
                        
                        <!-- CTA Button -->
                        <div class="mt-6">
                            <div class="inline-flex items-center gap-4 bg-aspire-navy text-white px-8 py-4 rounded-[40px] font-sans text-xl font-medium tracking-wide">
                                {{cover_button_text}}
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M7 17l9.2-9.2M17 17V7H7"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Branding Area -->
                    <div class="flex flex-col gap-6 mb-4">
                        <div class="w-[85%] h-[2px] bg-aspire-orange"></div>
                        <div class="flex flex-col gap-2">
                            <!-- Aspire Logo SVG Placeholder -->
                            <svg width="180" height="45" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22.5 5L35 35H27L22.5 24.2L18 35H10L22.5 5Z" fill="#0F1A20"/>
                                <path d="M10 5L22.5 35H14.5L10 24.2L5.5 35H-2.5L10 5Z" fill="#0F1A20"/>
                                <text x="45" y="28" font-family="'Instrument Serif', serif" font-size="28" fill="#0F1A20" font-weight="bold">ASPIRE</text>
                                <text x="47" y="38" font-family="'Instrument Sans', sans-serif" font-size="9" fill="#0F1A20" letter-spacing="2">HOME LOANS</text>
                            </svg>
                            <span class="font-sans text-xl text-aspire-navy font-medium mt-1">NMLS</span>
                        </div>
                    </div>

                </div>

                <!-- Right Image Column -->
                <div class="w-[42%] h-full relative">
                    <img src="{{url_background_img}}" class="w-full h-full object-cover" alt="Cover Image" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                </div>

            </div>
        </div>

        <!-- Footer Contact Info -->
        <div class="w-full h-[100px] flex items-center justify-center gap-14 px-[70px] pb-6 font-sans text-white/90 text-[19px]">
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                {{contact_phone}}
            </div>
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                {{contact_email}}
            </div>
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                {{contact_website}}
            </div>
        </div>

    </div>

</body>
</html>
