<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel - Outro Slide</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="/src/index.css" rel="stylesheet">
    <style>
        .template-canvas {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            transform-origin: top left;
        }
    </style>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen m-0">

    <!-- CANVAS 1080x1080 -->
    <div class="template-canvas w-[1080px] h-[1080px] shrink-0 shadow-2xl flex flex-col">
        
        <!-- Top Navy Section -->
        <div class="h-[60%] bg-[#23323B] flex flex-col px-[70px] pt-[70px]">
            
            <!-- Header: Logo & NMLS -->
            <div class="flex items-center justify-between pb-4 border-b-2 border-aspire-orange">
                <!-- Logo -->
                <svg width="180" height="45" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.5 5L35 35H27L22.5 24.2L18 35H10L22.5 5Z" fill="#FFFFFF"/>
                    <path d="M10 5L22.5 35H14.5L10 24.2L5.5 35H-2.5L10 5Z" fill="#FFFFFF"/>
                    <text x="45" y="28" font-family="'Instrument Serif', serif" font-size="28" fill="#FFFFFF" font-weight="bold">ASPIRE</text>
                    <text x="47" y="38" font-family="'Instrument Sans', sans-serif" font-size="9" fill="#FFFFFF" letter-spacing="2">HOME LOANS</text>
                </svg>
                <!-- NMLS -->
                <span class="font-sans text-[22px] text-white font-medium">NMLS</span>
            </div>
            
            <!-- Main Title -->
            <div class="flex-1 flex flex-col justify-center">
                <h1 class="font-serif text-[120px] leading-[0.9] tracking-tight text-white m-0">
                    <span class="block">{{outro_title_1}}</span>
                    <span class="block">{{outro_title_2}}</span>
                </h1>
            </div>
        </div>

        <!-- Middle Orange Section -->
        <div class="h-[30%] bg-aspire-orange px-[70px] flex items-center justify-between relative overflow-hidden">
            
            <!-- Left Text & Button -->
            <div class="w-[65%] flex flex-col gap-6 relative z-10">
                <p class="font-sans text-[30px] leading-tight text-white m-0">
                    {{outro_description}}
                </p>
                <div>
                    <div class="inline-flex items-center justify-center bg-aspire-navy text-white px-8 py-4 rounded-[40px] font-sans text-xl font-bold tracking-wide uppercase shadow-lg">
                        {{outro_button_text}}
                    </div>
                </div>
            </div>

            <!-- Right Graphic (Asterisk) -->
            <div class="absolute -right-8 top-1/2 -translate-y-1/2 opacity-90">
                <svg width="350" height="350" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 8 point asterisk / star -->
                    <path d="M50 10 V90 M10 50 H90 M22 22 L78 78 M22 78 L78 22" stroke="#1E2B33" stroke-width="8" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- Bottom Navy Footer -->
        <div class="h-[10%] bg-[#1E2B33] w-full flex items-center justify-center gap-14 px-[70px] font-sans text-white/90 text-[19px]">
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                {{contact_phone}}
            </div>
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                {{contact_email}}
            </div>
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                {{contact_website}}
            </div>
        </div>

    </div>

</body>
</html>
